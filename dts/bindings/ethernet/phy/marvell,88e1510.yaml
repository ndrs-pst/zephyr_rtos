# SPDX-License-Identifier: Apache-2.0

description: Marvell 88E1510 Gigabit Ethernet PHY

compatible: "marvell,88e1510"

include:
  - name: ethernet-phy-common.yaml
  - name: ethernet-phy-reset-gpios.yaml

on-bus: mdio

properties:
  led0-function-select:
    required: true
    type: string
    default: "link-activity"
    description: LED0 Function Select
    enum:
      - "#0"
      - "#1"
      - "link-speed"
      - "#3"
      - "link-activity"

  led1-function-select:
    required: true
    type: string
    default: "link-speed"
    description: LED1 Function Select
    enum:
      - "#0"
      - "#1"
      - "#2"
      - "#3"
      - "link-activity"
      - "#5"
      - "link-speed"

  default-speeds:
    default:
      - "1000BASE Full-Duplex"
      - "100BASE Full-Duplex"
      - "10BASE Full-Duplex"
