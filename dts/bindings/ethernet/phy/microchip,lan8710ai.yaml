description: Microchip LAN8710AI Single Port Ethernet PHY

compatible: "microchip,lan8710ai"

include:
  - name: ethernet-phy-common.yaml
  - name: ethernet-phy-reset-gpios.yaml

on-bus: mdio

properties:
  reg:
    required: true
    description: |
      5-bit MDIO PHY address for the attached PHY.

  led1-function-select:
    type: string
    default: "link-activity"
    description: LED1 Function Select
    enum:
      - "link-activity"
      - "#int"
      - "#pme"
      - "link-speed"

  led2-function-select:
    type: string
    default: "link-speed"
    description: LED2 Function Select
    enum:
      - "link-speed"
      - "#int"
      - "#pme"
      - "link-activity"

  default-speeds:
    default: ["10BASE Half-Duplex", "10BASE Full-Duplex", "100BASE Half-Duplex",
              "100BASE Full-Duplex"]

