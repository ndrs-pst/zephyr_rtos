description: MC33HB2000 H-Bridge, SPI programmable

compatible: "nxp,mc33hb2000"

include: [spi-device.yaml]

properties:
  int-gpios:
    type: phandle-array
    required: true
    description: |
      Interrupt pin.

      This pin signals active low when produced by the controller. The
      property value should ensure the flags properly describe the signal
      that is presented to the driver.
  reg:
    type: array
    required: true

  pwms:
    type: phandle-array
    description: |
      PWM channels for IN1 (index 0) and IN2 (index 1).
      Index 0: IN1 — forward drive (primary)
      Index 1: IN2 — feedback / secondary
      Required when using PWM-mode contactor control (no EN/DIS GPIO).
