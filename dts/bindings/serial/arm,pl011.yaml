description: ARM PL011 UART

compatible: "arm,pl011"

include: [uart-controller.yaml, pinctrl-device.yaml, reset-device.yaml]

properties:
  reg:
    required: true

  fifo-disable:
    type: boolean
    description: Disable the UART FIFO

  dmas:
    type: phandle-array
    description: |
      Optional DMA channel specifiers for TX and RX async operation.
      Must contain entries named "tx" and "rx" as declared by dma-names.

  dma-names:
    type: string-array
    description: |
      Names of the DMA channels referenced by the dmas property.
      Must be "tx" and "rx".
